<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>hiro AR Docent</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

   <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="colorManagement: true; exposure: 1.2;">
    
    <a-assets>
        <a-asset-item id="battery-model" src="path/to/your/battery_model.gltf"></a-asset-item>
    </a-assets>

    <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
    <a-entity light="type: directional; castShadow: true; intensity: 1.0; position: 1 2 1;"></a-entity>

    <a-marker preset="hiro">
        <a-entity 
            gltf-model="#battery-model" 
            scale="0.5 0.5 0.5" 
            position="0 0 0"
            style="color: #ffffff;"
            material="roughness: 0.2; metalness: 0.8;">
        </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
</a-scene>

</body>
</html>
