<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toys78 AR 도슨트 - 배터리 애니메이션 통합본</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.1/dist/aframe-environment-component.min.js"></script>

    <script>
      /**
       * 💡 33개의 개별 애니메이션 클립을 강제로 모두 재생하는 커스텀 컴포넌트
       */
      AFRAME.registerComponent('force-all-animations', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            const model = this.el.getObject3D('mesh');
            if (model && model.animations && model.animations.length > 0) {
              console.log(model.animations.length + "개의 애니메이션을 감지했습니다. 전체 재생을 시작합니다.");
              
              // 모델에 포함된 모든 클립(Action.015, CubeAction 등)을 순회하며 실행
              model.animations.forEach((clip) => {
                this.el.setAttribute('animation-mixer', {
                  clip: clip.name,      // 33개 각각의 이름 지정
                  loop: 'repeat',      // 무한 반복 (1회만 원하시면 'once'로 변경)
                  timeScale: 1,        // 재생 속도
                  crossFadeDuration: 0 // 즉시 실행
                });
              });
            } else {
              console.warn("모델에 애니메이션 데이터가 없습니다.");
            }
          });
        }
      });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true; colorManagement: true; antialias: true;">
        
        <a-assets>
            <a-asset-item id="battery-pack" src="carmodel.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="technical-marker.patt">
            <a-entity 
                id="target-model"
                gltf-model="#battery-pack" 
                scale="0.8 0.8 0.8" 
                position="0 0.5 0"
                force-all-animations>
            </a-entity>
        </a-marker>

        <a-entity environment="preset: city; active: false; lighting: none;"></a-entity>
        
        <a-entity light="type: ambient; color: #FFF; intensity: 1.2;"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 1.0;" position="1 4 3"></a-entity>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
