<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>차량용 배터리 AR 도슨트 - 터치 조작</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
</head>

<body style="margin: 0px; overflow: hidden;">
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true; antialias: true; colorManagement: true;"
        gesture-detector>
        
        <a-assets>
            <a-asset-item id="battery-model" src="carmodel.glb"></a-asset-item>
        </a-assets>

        <a-marker 
            type="pattern" 
            url="company-logo.patt"
            raycaster="objects: .clickable"
            emitevents="true"
            cursor="fuse: false; rayOrigin: mouse;">
            
            <a-entity 
                id="battery-entity"
                gltf-model="#battery-model" 
                scale="0.5 0.5 0.5" 
                position="0 0.2 0" 
                class="clickable"
                gesture-handler>
            </a-entity>

        </a-marker>

        <a-entity light="type: ambient; color: #ffffff; intensity: 0.7;"></a-entity>
        <a-entity light="type: directional; color: #ffffff; intensity: 1;" position="1 4 3"></a-entity>

        <a-entity camera></a-entity>

    </a-scene>
</body>
</html>
