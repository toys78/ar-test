<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toys78's AR 도슨트 - 배터리 애니메이션</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <script src="https://unpkg.com/aframe-environment-component@1.3.1/dist/aframe-environment-component.min.js"></script>

    <script>
      // 💡 클릭 시 애니메이션을 1회 실행하는 커스텀 컴포넌트
      AFRAME.registerComponent('click-to-animate', {
        init: function () {
          const el = this.el;
          let isPlaying = false;

          el.addEventListener('click', () => {
            if (!isPlaying) {
              // 애니메이션 믹서 속성 부여 (처음부터 끝까지 1회 재생)
              el.setAttribute('animation-mixer', {
                clip: '*', // GLB 내 모든 애니메이션 실행
                loop: 'once', // 1회만 재생
                clampWhenFinished: true // 끝나고 나서 마지막 프레임 유지
              });
              isPlaying = true;
              console.log("배터리 분해 애니메이션 시작!");
            } else {
              // 다시 터치하면 애니메이션 제거 (초기화)
              el.removeAttribute('animation-mixer');
              isPlaying = false;
              console.log("애니메이션 초기화");
            }
          });
        }
      });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true; colorManagement: true; antialias: true;"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">
        
        <a-assets>
            <a-asset-item id="car-model" src="carmodel.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="technical-marker.patt">
            <a-entity 
                id="target-model"
                gltf-model="#car-model" 
                scale="1.5 1.5 1.5" 
                position="0 0.5 0"
                class="clickable"
                click-to-animate>
            </a-entity>
        </a-marker>

        <a-entity environment="preset: city; active: false; lighting: none; shadow: true;"></a-entity>
        
        <a-entity light="type: ambient; color: #FFF; intensity: 1.0;"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 1.0;" position="1 4 3"></a-entity>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
