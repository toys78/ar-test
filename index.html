<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Stable Base</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

/* 안정적인 버튼 UI */
.play-ui {
    position: fixed;
    bottom: 60px;
    width: 100%;
    text-align: center;
    z-index: 10;
}

.play-btn {
    display: inline-block;
    padding: 14px 26px;
    border-radius: 30px;
    background: rgba(0,0,0,0.75);
    color: white;
    font-size: 16px;
}
</style>

<script>
// 애니메이션 컨트롤 (단순화 버전)
AFRAME.registerComponent('animation-controller', {
    init: function () {
        this.loaded = false;

        this.el.addEventListener('model-loaded', () => {
            this.loaded = true;
        });
    },

    play: function () {
        if (!this.loaded) return;

        this.el.setAttribute('animation-mixer', {
            clip: '*',
            loop: 'once',
            clampWhenFinished: true
        });
    }
});
</script>

</head>

<body>

<!-- 가장 안정적인 방식: 항상 보이는 버튼 -->
<div class="play-ui">
    <div class="play-btn" onclick="playAnimation()">
        PLAY
    </div>
</div>

<a-scene 
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;">

    <a-assets>
        <a-asset-item id="car-model" src="carmodel.glb"></a-asset-item>
    </a-assets>

    <!-- 최소 조명 (안정성 우선) -->
    <a-entity light="type: ambient; intensity: 1"></a-entity>

    <a-marker preset="hiro">

        <a-entity 
            id="car"
            gltf-model="#car-model"
            scale="0.8 0.8 0.8"
            animation-controller>
        </a-entity>

    </a-marker>

    <a-entity camera></a-entity>

</a-scene>

<script>
function playAnimation(){
    const car = document.querySelector('#car');
    if (!car) return;

    car.components['animation-controller'].play();
}
</script>

</body>
</html>
