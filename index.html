<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>hiro AR - Explode Animation Control</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <!-- animation-mixer (필수) -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

    <!-- environment -->
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

    <script>
        AFRAME.registerComponent('toggle-animation', {
            init: function () {
                this.isPlaying = false;
                const mixer = this.el;

                this.el.sceneEl.addEventListener('click', () => {
                    this.isPlaying = !this.isPlaying;

                    if (this.isPlaying) {
                        mixer.setAttribute('animation-mixer', {
                            clip: '*',
                            loop: 'once',
                            timeScale: 1
                        });
                    } else {
                        mixer.removeAttribute('animation-mixer');
                    }
                });
            }
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">

<a-scene 
    embedded 
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="
        colorManagement: true;
        exposure: 1.3;
        toneMapping: ACESFilmic;
        physicallyCorrectLights: true;
        shadowMap.enabled: true;
    ">

    <!-- Assets -->
    <a-assets>
        <a-asset-item id="car-model" src="carmodel.glb"></a-asset-item>
    </a-assets>

    <!-- Environment -->
    <a-entity environment="preset: city; lighting: none; skyType: atmosphere;"></a-entity>

    <!-- Lighting -->
    <a-entity light="type: ambient; intensity: 0.7; color: #bcdcff;"></a-entity>

    <a-entity 
        light="type: directional; intensity: 1.6; color: #fff2cc; castShadow: true"
        position="2 4 3">
    </a-entity>

    <a-entity 
        light="type: directional; intensity: 0.6"
        position="-2 2 1">
    </a-entity>

    <a-entity 
        light="type: directional; intensity: 0.8"
        position="0 3 -3">
    </a-entity>

    <!-- Marker -->
    <a-marker preset="hiro">

        <!-- Shadow receiver -->
        <a-plane 
            rotation="-90 0 0"
            width="5"
            height="5"
            material="opacity: 0"
            shadow="receive: true">
        </a-plane>

        <!-- Model -->
        <a-entity 
            id="car-unit"
            gltf-model="#car-model"
            scale="0.8 0.8 0.8"
            position="0 0 0"

            shadow="cast: true; receive: true"

            toggle-animation>
        </a-entity>

    </a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>

</a-scene>

</body>
</html>
