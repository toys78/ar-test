<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>hiro AR - Improved HDR Look</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

<a-scene 
    embedded 
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="
        colorManagement: true;
        exposure: 1.3;
        toneMapping: ACESFilmic;
        physicallyCorrectLights: true;
        shadowMap.enabled: true;
    ">

    <!-- Assets -->
    <a-assets>
        <a-asset-item id="car-model" src="carmodel.glb"></a-asset-item>
    </a-assets>

    <!-- Environment (visual only, lighting off) -->
    <a-entity environment="preset: city; lighting: none; skyType: atmosphere;"></a-entity>

    <!-- Fake HDR lighting setup -->
    <!-- Ambient (soft blue sky bounce) -->
    <a-entity light="type: ambient; intensity: 0.7; color: #bcdcff;"></a-entity>

    <!-- Key light (main sunlight) -->
    <a-entity 
        light="type: directional; intensity: 1.6; color: #fff2cc; castShadow: true"
        position="2 4 3">
    </a-entity>

    <!-- Fill light (soft shadow control) -->
    <a-entity 
        light="type: directional; intensity: 0.6; color: #ffffff"
        position="-2 2 1">
    </a-entity>

    <!-- Back light (rim highlight) -->
    <a-entity 
        light="type: directional; intensity: 0.8; color: #ffffff"
        position="0 3 -3">
    </a-entity>

    <!-- Marker -->
    <a-marker preset="hiro">

        <!-- Shadow receiver plane (invisible but important) -->
        <a-plane 
            rotation="-90 0 0"
            width="5"
            height="5"
            material="opacity: 0.0"
            shadow="receive: true">
        </a-plane>

        <!-- Car Model -->
        <a-entity 
            id="car-unit"
            gltf-model="#car-model"

            position="0 0 0"
            scale="0.8 0.8 0.8"

            shadow="cast: true; receive: true"

            animation="
                property: rotation;
                to: 0 360 0;
                loop: true;
                dur: 24000;
                easing: linear;
            ">

        </a-entity>

    </a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>

</a-scene>

</body>
</html>
