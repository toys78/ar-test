<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Battery AR Test - toys78</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.1/dist/aframe-environment-component.min.js"></script>

    <script>
      AFRAME.registerComponent('click-to-animate', {
        init: function () {
          this.el.addEventListener('click', () => {
            this.el.setAttribute('animation-mixer', {clip: '*', loop: 'once', clampWhenFinished: true});
            console.log("Animation Triggered");
          });
        }
      });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true; colorManagement: true;"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">
        
        <a-assets>
            <a-asset-item id="car" src="carmodel.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="technical-marker.patt">
            <a-entity 
                id="car-model"
                gltf-model="#car" 
                scale="1.5 1.5 1.5" 
                position="0 0.5 0"
                class="clickable"
                click-to-animate>
            </a-entity>
        </a-marker>

        <a-entity environment="preset: city; active: false; lighting: none;"></a-entity>
        
        <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
        <a-entity light="type: directional; intensity: 1.2;" position="1 4 3"></a-entity>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
