<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toys78 AR - Visibility Fix</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.1/dist/aframe-environment-component.min.js"></script>

    <script>
      /**
       * 🚨 모델이 안 보일 때를 대비한 '가시성 우선' 애니메이션 로직
       */
      AFRAME.registerComponent('safe-animation-loader', {
        init: function () {
          const el = this.el;

          // 1. 모델 로딩 완료 감지
          el.addEventListener('model-loaded', () => {
            console.log("✅ 모델 로딩 성공: ", el.id);
            
            // 모델이 너무 작거나 커서 안 보일 수 있으므로 콘솔에 바운딩 박스 크기 출력 (디버깅용)
            const obj = el.getObject3D('mesh');
            const box = new THREE.Box3().setFromObject(obj);
            console.log("모델 크기 데이터:", box.getSize(new THREE.Vector3()));

            // 2. 애니메이션 클립 강제 실행 (약간의 지연 시간을 두어 렌더링 안정성 확보)
            setTimeout(() => {
              if (obj.animations && obj.animations.length > 0) {
                // 33개 클립을 한꺼번에 제어하기 위해 loop: repeat와 clip: * 사용
                el.setAttribute('animation-mixer', {
                  clip: '*', 
                  loop: 'repeat',
                  timeScale: 1
                });
                console.log(obj.animations.length + "개의 애니메이션 재생 시작");
              }
            }, 500); 
          });

          // 3. 에러 감지
          el.addEventListener('model-error', (e) => {
            console.error("❌ 모델 로드 에러 발생:", e);
            alert("모델 파일을 찾을 수 없거나 형식이 잘못되었습니다.");
          });
        }
      });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="colorManagement: true; antialias: true;">
        
        <a-assets>
            <a-asset-item id="battery-pack" src="carmodel.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="technical-marker.patt">
            <a-entity 
                id="target-model"
                gltf-model="#battery-pack" 
                scale="1 1 1" 
                position="0 0 0"
                safe-animation-loader>
            </a-entity>
        </a-marker>

        <a-entity environment="preset: city; active: false; lighting: none;"></a-entity>
        
        <a-entity light="type: ambient; color: #FFF; intensity: 2.0;"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 1.5;" position="1 4 3"></a-entity>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
