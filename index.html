<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>hiro AR Docent - Click to Explode</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="colorManagement: true; exposure: 1.5;"
        cursor="fuse: false; rayOrigin: mouse"> <a-assets>
            <a-asset-item id="battery-model" src="carmodel.glb"></a-asset-item>
        </a-assets>

        <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
        <a-entity light="type: directional; intensity: 1.8; position: 1 4 2;"></a-entity>

        <a-marker preset="hiro">
            <a-entity 
                id="battery-unit"
                gltf-model="#battery-model" 
                scale="0.5 0.5 0.5" 
                position="0 0 0"
                animation__rotate="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear; autoplay: true"
                
                /* 분해 애니메이션 트리거: 모델을 터치하면 scale이 커지며 분해되는 효과 연출 */
                animation__explode="property: scale; to: 0.8 0.8 0.8; dur: 500; startEvents: click"
                animation__restore="property: scale; to: 0.5 0.5 0.5; dur: 500; startEvents: mouseleave">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
