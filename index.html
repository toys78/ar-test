<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="colorManagement: true; antialias: true;">
        
        <a-assets>
            <a-asset-item id="battery" src="carmodel.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <a-entity 
                id="model-target"
                gltf-model="#battery" 
                scale="0.01 0.01 0.01" 
                position="0 0 0">
            </a-entity>
        </a-marker>

        <a-entity light="type: ambient; intensity: 3;"></a-entity>
        <a-entity light="type: directional; intensity: 2;" position="1 4 3"></a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // 모델 로딩 상태를 알림창으로 확인
        const el = document.querySelector('#model-target');
        el.addEventListener('model-loaded', () => {
            alert("✅ 모델 로드 성공! 마커 위를 확인하세요.");
        });
        el.addEventListener('model-error', (e) => {
            alert("❌ 모델 로드 실패: 파일 경로를 확인하세요.");
        });
    </script>
</body>
</html>
