<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Explode Control UI</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

.ui {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
}

button {
    padding: 12px 18px;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    background: rgba(0,0,0,0.7);
    color: white;
}
</style>

<script>
AFRAME.registerComponent('animation-controller', {
    init: function () {
        this.mixer = null;
        this.modelLoaded = false;

        this.el.addEventListener('model-loaded', () => {
            this.modelLoaded = true;
        });
    },

    playForward: function () {
        if (!this.modelLoaded) return;

        this.el.setAttribute('animation-mixer', {
            clip: '*',
            loop: 'once',
            timeScale: 1,
            clampWhenFinished: true
        });
    },

    playReverse: function () {
        if (!this.modelLoaded) return;

        this.el.setAttribute('animation-mixer', {
            clip: '*',
            loop: 'once',
            timeScale: -1,
            startAt: 1,
            clampWhenFinished: true
        });
    },

    stop: function () {
        this.el.removeAttribute('animation-mixer');
    }
});
</script>

</head>

<body>

<!-- UI -->
<div class="ui">
    <button onclick="explode()">분해</button>
    <button onclick="assemble()">조립</button>
</div>

<a-scene 
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="
        colorManagement: true;
        exposure: 1.3;
        toneMapping: ACESFilmic;
        physicallyCorrectLights: true;
        shadowMap.enabled: true;
    ">

    <a-assets>
        <a-asset-item id="car-model" src="carmodel.glb"></a-asset-item>
    </a-assets>

    <!-- Lighting -->
    <a-entity light="type: ambient; intensity: 0.7; color: #bcdcff;"></a-entity>

    <a-entity light="type: directional; intensity: 1.6; color: #fff2cc; castShadow: true"
        position="2 4 3"></a-entity>

    <a-entity light="type: directional; intensity: 0.6"
        position="-2 2 1"></a-entity>

    <a-entity light="type: directional; intensity: 0.8"
        position="0 3 -3"></a-entity>

    <!-- Marker -->
    <a-marker preset="hiro">

        <!-- Shadow -->
        <a-plane rotation="-90 0 0" width="5" height="5"
            material="opacity:0" shadow="receive:true"></a-plane>

        <!-- Model -->
        <a-entity 
            id="car"
            gltf-model="#car-model"
            scale="0.8 0.8 0.8"
            shadow="cast: true; receive: true"
            animation-controller>
        </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
</a-scene>

<script>
function explode(){
    document.querySelector('#car').components['animation-controller'].playForward();
}

function assemble(){
    document.querySelector('#car').components['animation-controller'].playReverse();
}
</script>

</body>
</html>
