<div class="play-ui">
    <div class="play-btn" onclick="playAnimation()">
        ▶ TAP TO PLAY
    </div>
</div>

<style>
.play-ui {
    position: fixed;
    bottom: 60px;
    width: 100%;
    text-align: center;
    z-index: 10;
}

.play-btn {
    display: inline-block;
    padding: 14px 24px;
    border-radius: 30px;
    background: rgba(0,0,0,0.75);
    color: white;
    font-size: 16px;

    animation: fadeIn 0.8s ease-out, pulse 1.5s infinite;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
    0% { opacity: 0.6; }
    50% { opacity: 1; }
    100% { opacity: 0.6; }
}
</style>

<script>
function playAnimation(){

    const car = document.querySelector('#car');
    const ui = document.querySelector('.play-ui');

    if (!car || !car.components['animation-controller']) return;

    car.components['animation-controller'].play();

    ui.style.transition = "opacity 0.5s";
    ui.style.opacity = "0";

    setTimeout(()=>{
        ui.style.display = "none";
    },500);
}
</script>
