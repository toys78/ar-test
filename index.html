<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Explode Only</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<!-- AR.js -->
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<!-- animation mixer -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

.ui {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
}

button {
    padding: 12px 18px;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    background: rgba(0,0,0,0.7);
    color: white;
}
</style>

<script>
// 🎬 애니메이션 컨트롤
AFRAME.registerComponent('animation-controller', {
    init: function () {
        this.modelLoaded = false;

        this.el.addEventListener('model-loaded', () => {
            this.modelLoaded = true;
        });
    },

    playForward: function () {
        if (!this.modelLoaded) return;

        this.el.removeAttribute('animation-mixer');

        this.el.setAttribute('animation-mixer', {
            clip: '*',
            loop: 'once',
            timeScale: 1,
            clampWhenFinished: true
        });
    }
});

// 💎 반투명 + Z-Fighting 해결
AFRAME.registerComponent('fix-transparency', {
    init: function () {
        this.el.addEventListener('model-loaded', () => {
            const mesh = this.el.getObject3D('mesh');

            mesh.traverse((node) => {
                if (node.isMesh && node.material) {

                    // 🔥 Z-Fighting 해결 핵심
                    node.material.polygonOffset = true;
                    node.material.polygonOffsetFactor = 1;
                    node.material.polygonOffsetUnits = 1;

                    node.renderOrder = 1;

                    // 💎 반투명 처리
                    if (node.material.opacity < 1 ||
                        node.material.name.toLowerCase().includes('glass')) {

                        node.material.transparent = true;
                        node.material.opacity = 0.5;

                        node.material.depthWrite = false;
                        node.material.side = THREE.DoubleSide;

                        node.material.emissive = new THREE.Color(0x222222);

                        node.material.metalness = 0;
                        node.material.roughness = 0.1;
                    }

                    node.material.needsUpdate = true;
                }
            });
        });
    }
});
</script>

</head>

<body>

<!-- 🎮 UI -->
<div class="ui">
    <button onclick="explode()">분해</button>
</div>

<a-scene 
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="
        colorManagement: true;
        exposure: 1.3;
        toneMapping: ACESFilmic;
        physicallyCorrectLights: true;
        shadowMap.enabled: true;
        logarithmicDepthBuffer: true;
    ">

    <a-assets>
        <a-asset-item id="car-model" src="carmodel.glb"></a-asset-item>
    </a-assets>

    <!-- 💡 조명 -->
    <a-entity light="type: ambient; intensity: 0.7; color: #bcdcff;"></a-entity>

    <a-entity 
        light="type: directional; intensity: 1.6; color: #fff2cc; castShadow: true"
        position="2 4 3">
    </a-entity>

    <a-entity 
        light="type: directional; intensity: 0.6"
        position="-2 2 1">
    </a-entity>

    <a-entity 
        light="type: directional; intensity: 0.8"
        position="0 3 -3">
    </a-entity>

    <a-marker preset="hiro">

        <a-plane 
            rotation="-90 0 0"
            width="5"
            height="5"
            material="opacity:0"
            shadow="receive:true">
        </a-plane>

        <!-- 🚗 모델 -->
        <a-entity 
            id="car"
            gltf-model="#car-model"
            scale="0.8 0.8 0.8"

            shadow="cast: true; receive: true"

            animation-controller
            fix-transparency>
        </a-entity>

    </a-marker>

    <a-entity camera="near: 0.1; far: 100"></a-entity>

</a-scene>

<script>
// 🎮 분해 실행
function explode(){
    document.querySelector('#car')
        .components['animation-controller']
        .playForward();
}
</script>

</body>
</html>
