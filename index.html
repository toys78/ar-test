<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="colorManagement: true;">
        
        <a-assets>
            <a-asset-item id="car" src="carmodel.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="technical-marker.patt">
            <a-entity 
                id="model-target"
                gltf-model="#car" 
                scale="0.5 0.5 0.5" 
                position="0 0.5 0"
                animation-mixer="clip: *; loop: repeat; timeScale: 1;">
            </a-entity>
        </a-marker>

        <a-entity light="type: ambient; intensity: 2;"></a-entity>
        <a-entity light="type: directional; intensity: 1.5;" position="1 4 3"></a-entity>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // 💡 디버깅용: 모델이 로드되었는지 콘솔에 표시
        document.querySelector('#model-target').addEventListener('model-loaded', () => {
            console.log("✅ 모델 로드 완료!");
            // 로드 직후 애니메이션 상태 강제 확인
            const el = document.querySelector('#model-target');
            console.log("현재 애니메이션 설정:", el.getAttribute('animation-mixer'));
        });
    </script>
</body>
</html>
